/* ═══════════ UTILS ═══════════ */
const fmtDate = s => {
  try { return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}); }
  catch { return s; }
};
const addDays = (s,n) => {
  const d = new Date(s+"T12:00:00"); d.setDate(d.getDate()+n);
  return d.toISOString().split("T")[0];
};
const fmtESPNDate = s => s.replace(/-/g,"");
const toDateStr = utc => {
  try { return new Date(utc).toLocaleDateString("en-CA",{timeZone:"America/Chicago"}); }
  catch { return ""; }
};
const toCDT = utc => {
  try {
    return new Date(utc).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:"America/Chicago"})+" CDT";
  } catch { return "TBD"; }
};

/* ═══════════ ESPN API FETCH ═══════════ */
async function fetchStandings() {
  const url = `https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("ESPN standings error");
  const data = await res.json();
  const groups = [];
  for (const entry of (data.children || [])) {
    const groupName = entry.name?.replace("Group ","").trim() || "?";
    const standings = (entry.standings?.entries || []).map(e => {
      const team = e.team?.displayName || e.team?.name || "TBD";
      const stats = {};
      (e.stats || []).forEach(s => { stats[s.name] = s.value; });
      return {
        name: team,
        played: stats.gamesPlayed || 0,
        w: stats.wins || 0,
        d: stats.ties || 0,
        l: stats.losses || 0,
        gf: stats.pointsFor || 0,
        ga: stats.pointsAgainst || 0,
        gd: stats.pointDifferential || 0,
        pts: stats.points || 0,
      };
    });
standings.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    groups.push({ name: groupName, standings });
  }
  return groups;
}
  async function fetchESPN(dateStr) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${fmtESPNDate(dateStr)}&limit=20`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("ESPN API error");
  const data = await res.json();
  const events = data.events || [];
  return events.map(ev => {
    const comp = ev.competitions?.[0];
    const home = comp?.competitors?.find(c=>c.homeAway==="home");
    const away = comp?.competitors?.find(c=>c.homeAway==="away");
    const status = comp?.status?.type;
    const done = status?.completed || status?.name==="STATUS_FINAL";
    const live = status?.name==="STATUS_IN_PROGRESS" || status?.name==="STATUS_HALFTIME";
    const hScore = done||live ? parseInt(home?.score||"0") : null;
    const aScore = done||live ? parseInt(away?.score||"0") : null;
    const hName = home?.team?.displayName || home?.team?.name || "TBD";
    const aName = away?.team?.displayName || away?.team?.name || "TBD";
    return {
      date: toDateStr(ev.date),
      time: toCDT(ev.date),
      team1: hName,
      team2: aName,
      score1: hScore,
      score2: aScore,
      group: getGroup(hName),
      venue: comp?.venue?.fullName || "",
      city: comp?.venue?.address?.city || "",
      status: done?"FINAL": live?"LIVE":"UPCOMING",
      goals1:[], goals2:[], redCards:[],
      espnId: ev.id,
    };
  });
}

/* ═══════════ STANDINGS CALCULATOR ═══════════ */
const calcStandings = matches => {
  const stats = {};
  const init = n => { if (!stats[n]) stats[n]={name:n,played:0,w:0,d:0,l:0,gf:0,ga:0}; };
  matches.forEach(m => {
    if (m.score1==null||m.score2==null) return;
    init(m.team1); init(m.team2);
    stats[m.team1].played++; stats[m.team2].played++;
    stats[m.team1].gf+=m.score1; stats[m.team1].ga+=m.score2;
    stats[m.team2].gf+=m.score2; stats[m.team2].ga+=m.score1;
    if(m.score1>m.score2){stats[m.team1].w++;stats[m.team2].l++;}
    else if(m.score2>m.score1){stats[m.team2].w++;stats[m.team1].l++;}
    else{stats[m.team1].d++;stats[m.team2].d++;}
  });
  return Object.entries(GROUP_MAP).map(([grp,teams])=>({
    name:grp,
    standings:teams.map(t=>{
      const s=stats[t]||{name:t,played:0,w:0,d:0,l:0,gf:0,ga:0};
      return{...s,gd:s.gf-s.ga,pts:s.w*3+s.d};
    }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf)
  }));
};

/* ═══════════ AI SUMMARY ═══════════ */
function makeLocalSummary(m) {
  const h=m.team1,a=m.team2,hs=m.score1,as_=m.score2,grp=m.group;
  const g1=m.goals1||[],g2=m.goals2||[],rc=m.redCards||[];
  let s="";
  if(hs>as_) s=`What a result! ${fl(h)} ${h} beat ${fl(a)} ${a} ${hs}–${as_} and picks up 3 big points in Group ${grp}! `;
  else if(as_>hs) s=`Big result! ${fl(a)} ${a} beat ${fl(h)} ${h} ${as_}–${hs} and earns 3 points in Group ${grp}! `;
  else s=`What a battle! ${fl(h)} ${h} and ${fl(a)} ${a} drew ${hs}–${as_} in Group ${grp}, each earning 1 point. `;
  const all=[...g1.map(g=>({...g,t:h})),...g2.map(g=>({...g,t:a}))].sort((a,b)=>parseInt(a.minute)-parseInt(b.minute));
  if(all.length) s+="Goals: "+all.map(g=>`${fl(g.t)} ${g.name} (${g.minute}')`).join(", ")+". ";
  if(rc.length){
    s+=`There ${rc.length>1?"were":"was"} also ${rc.length} red card${rc.length>1?"s":""} — `;
    s+=rc.map(r=>`${r.player} (${r.team})`).join(" and ");
    s+=` got sent off. A red card means a player is ejected and their team must play with one fewer person for the rest of the match! `;
  }
  if(hs>as_) s+=`In the World Cup, teams earn 3 points for a win, 1 for a draw. ${h} is off to a great start in Group ${grp}! 🌟`;
  else if(as_>hs) s+=`In the World Cup, teams earn 3 points for a win, 1 for a draw. ${a} is off to a great start in Group ${grp}! 🌟`;
  else s+=`Both teams will be hoping for a win next time — teams need enough points to advance to the knockout rounds! 🤞`;
  return s;
}

async function getAISummary(m) {
  const g1=(m.goals1||[]).map(g=>`${g.name} (${g.minute}')`).join(", ");
  const g2=(m.goals2||[]).map(g=>`${g.name} (${g.minute}')`).join(", ");
  const rc=(m.redCards||[]).map(r=>`${r.player||r.team} (${r.minute||"?"})'`).join(", ");
  const prompt=`Write a fun, warm 3-4 sentence World Cup recap for a dad sharing with his two 10-year-old daughters who love geography and travel but are new to soccer. Simple language only!\n\nMatch: ${m.team1} ${m.score1}–${m.score2} ${m.team2} | Group ${m.group}\n${g1?m.team1+" goals: "+g1:""}\n${g2?m.team2+" goals: "+g2:""}\n${rc?"Red cards: "+rc+" (ejected — their team plays short-handed)":" "}\n\nCover: (1) exciting result, (2) standout moments, (3) what these points mean for Group ${m.group} standings — 3 pts for win, 1 for draw, need enough to advance to knockout rounds.`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  if(data.type==="error"||!data.content) throw new Error();
  return data.content?.[0]?.text||null;
}

async function getSummary(m) {
  try { const ai=await getAISummary(m); if(ai) return {text:ai,ai:true}; } catch {}
  return {text:makeLocalSummary(m),ai:false};
}

        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:36}}>{fl(m.team1)}</div>
          <div style={{fontSize:13,fontWeight:700,marginTop:5,color:C.text}}>{m.team1}</div>
          {done&&m.goals1&&m.goals1.length>0&&<div style={{fontSize:10,color:C.muted,marginTop:3,lineHeight:1.6}}>{m.goals1.map(g=>`⚽ ${g.name} ${g.minute}'`).join("\n")}</div>}
          {done&&rc.filter(r=>r.team===m.team1).length>0&&<div style={{fontSize:10,color:C.red,marginTop:2}}>🟥 {rc.filter(r=>r.team===m.team1).map(r=>`${r.player} ${r.minute}'`).join(", ")}</div>}
        </div>
        <div style={{textAlign:"center",minWidth:80}}>
          {done||live
            ?<div style={{fontSize:30,fontWeight:900,color:C.text}}>{m.score1}<span style={{color:C.muted,margin:"0 4px"}}>–</span>{m.score2}</div>
            :<div style={{fontSize:18,color:C.muted}}>vs</div>}
        </div>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:36}}>{fl(m.team2)}</div>
          <div style={{fontSize:13,fontWeight:700,marginTop:5,color:C.text}}>{m.team2}</div>
          {done&&m.goals2&&m.goals2.length>0&&<div style={{fontSize:10,color:C.muted,marginTop:3,lineHeight:1.6}}>{m.goals2.map(g=>`⚽ ${g.name} ${g.minute}'`).join("\n")}</div>}
          {done&&rc.filter(r=>r.team===m.team2).length>0&&<div style={{fontSize:10,color:C.red,marginTop:2}}>🟥 {rc.filter(r=>r.team===m.team2).map(r=>`${r.player} ${r.minute}'`).join(", ")}</div>}
        </div>
      </div>
      {m.venue&&m.venue!=="TBD"&&<div style={{marginTop:11,textAlign:"center",color:C.muted,fontSize:12}}>🏟️ {m.venue}{m.city?`, ${m.city}`:""}</div>}
    </div>
  );
}

/* ═══════════ SUMMARY CARD ═══════════ */
function SummaryCard({m}) {
  const [state,setState]=useState({text:null,loading:false,ai:false});
  const hf=getFact(m.team1),af=getFact(m.team2),rc=m.redCards||[];
  const generate=async()=>{
    setState(s=>({...s,loading:true}));
    const res=await getSummary(m);
    setState({text:res.text,loading:false,ai:res.ai});
  };
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginBottom:6}}>
        <span style={{fontSize:28}}>{fl(m.team1)}</span>
        <span style={{fontSize:22,fontWeight:900,color:C.text}}>{m.score1} – {m.score2}</span>
        <span style={{fontSize:28}}>{fl(m.team2)}</span>
      </div>
      <div style={{textAlign:"center",color:C.muted,fontSize:12,marginBottom:10}}>{m.team1} vs {m.team2} · Group {m.group}</div>
      {(m.goals1&&m.goals1.length>0||m.goals2&&m.goals2.length>0||rc.length>0)&&(
        <div style={{background:"rgba(255,255,255,.03)",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:12,lineHeight:1.8,color:"#A8BDD0",textAlign:"center"}}>
          {(m.goals1||[]).map(g=><div key={g.name}>{fl(m.team1)} ⚽ {g.name} {g.minute}'</div>)}
          {(m.goals2||[]).map(g=><div key={g.name}>{fl(m.team2)} ⚽ {g.name} {g.minute}'</div>)}
          {rc.map((r,i)=><div key={i} style={{color:C.red}}>🟥 {r.player||"Player"} ({r.team}) {r.minute}'</div>)}
        </div>
      )}
      {!state.text&&!state.loading&&(
        <button onClick={generate} style={{width:"100%",padding:12,borderRadius:10,background:"linear-gradient(135deg,#00A843,#00D158)",color:"#fff",fontWeight:700,fontSize:14,border:"none",cursor:"pointer",marginBottom:14}}>
          ✨ Read Game Summary
        </button>
      )}
      {state.loading&&<div style={{textAlign:"center",padding:"16px 0",color:C.muted,marginBottom:14}}><div style={{fontSize:26}}>⚽</div><div style={{fontSize:13,marginTop:6}}>Generating recap...</div></div>}
      {state.text&&(
        <div style={{marginBottom:16}}>
          <div style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"14px 15px",fontSize:14,lineHeight:1.75,color:C.text}}>{state.text}</div>
          {state.ai&&<div style={{textAlign:"center",fontSize:10,color:C.muted,marginTop:6}}>✨ AI-generated summary</div>}
        </div>
      )}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:13}}>
        <div style={{fontSize:11,color:C.gold,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>🗺️ Fun Facts for Curious Travelers</div>
        {[{name:m.team1,d:hf},{name:m.team2,d:af}].map(({name,d})=>(
          <div key={name} style={{border:"1.5px dashed rgba(255,215,0,.25)",borderRadius:10,padding:"10px 12px",marginBottom:8,fontSize:13,lineHeight:1.6,color:"#C4D4E4"}}>
            <span style={{fontSize:18,marginRight:6}}>{d.e}</span><strong style={{color:C.text}}>{name}:</strong>{" "}{d.f}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════ GROUP TABLE ═══════════ */
function GroupTable({g}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",marginBottom:12}}>
      <div style={{background:C.goldBg,borderBottom:`1px solid ${C.border}`,padding:"10px 14px",fontWeight:800,fontSize:13,color:C.gold}}>GROUP {g.name}</div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr>{["#","Team","P","W","D","L","GD","Pts"].map((h,i)=>(
          <th key={i} style={{padding:"8px 8px",fontWeight:500,fontSize:11,color:h==="Pts"?C.green:C.muted,textAlign:i<2?"left":"center"}}>{h}</th>
        ))}</tr></thead>
        <tbody>{g.standings.map((t,i)=>{
          const adv=i<2;
          return <tr key={i} style={{background:adv?C.adv:"transparent",borderTop:`1px solid ${C.border}`}}>
            <td style={{padding:"10px 8px",color:adv?C.green:C.muted,fontWeight:700,textAlign:"left"}}>{i+1}</td>
            <td style={{padding:"10px 8px",textAlign:"left"}}><span style={{marginRight:6}}>{fl(t.name)}</span><span style={{fontWeight:600,color:C.text}}>{t.name}</span>{adv&&<span style={{marginLeft:5,fontSize:10,color:C.green}}>↑</span>}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.played}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.w}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.d}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.l}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.gd>=0?"+":""}{t.gd}</td>
            <td style={{padding:"10px 8px",textAlign:"center",fontWeight:900,color:C.green}}>{t.pts}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>
  );
}

/* ═══════════ MAIN APP ═══════════ */
function App() {
  const today = new Date().toLocaleDateString("en-CA",{timeZone:"America/Chicago"});
  const [tab,setTab]=useState("schedule");
  const [dateStr,setDateStr]=useState(today);
  const [matchCache,setMatchCache]=useState({});
  const [allMatches,setAllMatches]=useState(FALLBACK);
  const [loading,setLoading]=useState(false);
  const [lastUpdate,setLastUpdate]=useState(null);
  const [dataSource,setDataSource]=useState("hardcoded");
  const [liveGroups,setLiveGroups]=useState([]);
  const timerRef=useRef(null);
const loadStandings = useCallback(async()=>{
  const start = new Date("2026-06-11T12:00:00");
  const today = new Date();
  const dates = [];
  for(let d=new Date(start); d<=today; d.setDate(d.getDate()+1)){
    dates.push(d.toISOString().split("T")[0]);
  }
  try {
    const results = await Promise.all(dates.map(d=>fetchESPN(d).catch(()=>[])));
    const newCache = {};
    dates.forEach((d,i)=>{ if(results[i].length>0) newCache[d]=results[i]; });
    if(Object.keys(newCache).length>0) setMatchCache(prev=>({...prev,...newCache}));
  } catch {}
},[]);
  const loadDay = useCallback(async(date, silent=false)=>{
    if(!silent) setLoading(true);
    try {
      const espn = await fetchESPN(date);
      if(espn.length>0){
        setMatchCache(prev=>({...prev,[date]:espn}));
        setDataSource("espn");
      } else {
        // No ESPN data for this date — keep whatever we have
        setDataSource("hardcoded");
      }
      setLastUpdate(new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/Chicago"}));
    } catch {
      setDataSource("hardcoded");
    } finally {
      if(!silent) setLoading(false);
    }
  },[]);

  // On date change, load that day from ESPN
useEffect(()=>{
  fetchStandings().then(g=>{ if(g.length>0) setLiveGroups(g); }).catch(()=>{});
  const t=setInterval(()=>fetchStandings().then(g=>{ if(g.length>0) setLiveGroups(g); }).catch(()=>{}),60000);
  return ()=>clearInterval(t);
},[]);
  useEffect(()=>{
    loadDay(dateStr);
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>loadDay(dateStr,true),60000);
    return ()=>clearInterval(timerRef.current);
  },[dateStr,loadDay]);

  // Build allMatches: ESPN cache overrides fallback
  useEffect(()=>{
    const cached = Object.values(matchCache).flat();
    if(cached.length===0){ setAllMatches(FALLBACK); return; }
    // Merge: use ESPN data for cached dates, fallback for the rest
    const cachedDates = new Set(Object.keys(matchCache));
    const fallbackOther = FALLBACK.filter(m=>!cachedDates.has(m.date));
    setAllMatches([...fallbackOther,...cached]);
  },[matchCache]);

  const dayMatches = allMatches.filter(m=>m.date===dateStr);
  const completed = dayMatches.filter(m=>m.score1!=null&&m.score2!=null);
 const groups = liveGroups.length > 0 ? liveGroups : calcStandings(allMatches);
  const TABS=[{id:"schedule",label:"📅 Schedule"},{id:"standings",label:"🏆 Standings"},{id:"summaries",label:"📰 Summaries"}];

  return (
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:600,margin:"0 auto",color:C.text,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#0C1F3D,#08111E)",borderBottom:`3px solid ${C.green}`,padding:"20px 16px 14px",position:"sticky",top:0,zIndex:10}}>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:11,color:C.gold,letterSpacing:3,fontWeight:700,textTransform:"uppercase"}}>FIFA World Cup 2026</div>
          <div style={{fontSize:26,fontWeight:900,letterSpacing:-0.5,marginTop:2}}>⚽ Match Tracker</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2,letterSpacing:1}}>USA · CANADA · MEXICO</div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
          <button onClick={()=>setDateStr(s=>addDays(s,-1))} style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,color:C.text,borderRadius:10,width:42,height:42,fontSize:20,cursor:"pointer"}}>‹</button>
          <div style={{textAlign:"center",minWidth:200}}>
            <div style={{fontSize:15,fontWeight:700}}>{fmtDate(dateStr)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>
              {loading?"Fetching live scores...":dayMatches.length>0?`${dayMatches.length} match${dayMatches.length>1?"es":""} · ${completed.length} final`:"No matches"}
            </div>
          </div>
          <button onClick={()=>setDateStr(s=>addDays(s,1))} style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,color:C.text,borderRadius:10,width:42,height:42,fontSize:20,cursor:"pointer"}}>›</button>
        </div>
        {/* Live indicator */}
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginTop:10}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:dataSource==="espn"?C.green:C.muted}}/>
          <span style={{fontSize:10,color:dataSource==="espn"?C.green:C.muted}}>
            {dataSource==="espn"?"Live data via ESPN":"Showing known results"}
            {lastUpdate?` · Updated ${lastUpdate}`:""}
          </span>
          <button onClick={()=>loadDay(dateStr)} style={{background:"none",border:"none",color:C.blue,fontSize:10,cursor:"pointer",textDecoration:"underline",fontFamily:"inherit"}}>Refresh</button>
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",background:"#0C1A2E",borderBottom:`1px solid ${C.border}`}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"13px 4px",background:"none",border:"none",borderBottom:tab===t.id?`3px solid ${C.green}`:"3px solid transparent",color:tab===t.id?C.green:C.muted,fontWeight:tab===t.id?700:400,fontSize:13,cursor:"pointer"}}>{t.label}</button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{padding:16}}>

        {tab==="schedule"&&(
          loading&&dayMatches.length===0
            ?<div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:44,marginBottom:10}}>⚽</div><div style={{fontSize:15}}>Fetching live scores...</div></div>
            :dayMatches.length===0
              ?<div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:44,marginBottom:10}}>📅</div><div style={{fontWeight:700,fontSize:16,marginBottom:6}}>No matches scheduled</div><div style={{fontSize:13}}>Tap the arrows to browse match days</div></div>
              :dayMatches.map((m,i)=><MatchCard key={i} m={m}/>)
        )}

        {tab==="standings"&&(
          <>
            <div style={{background:"rgba(0,209,88,.08)",border:"1px solid rgba(0,209,88,.2)",borderRadius:10,padding:"10px 14px",fontSize:12,color:C.green,textAlign:"center",marginBottom:16}}>
              ↑ Top 2 per group advance automatically · Plus the 8 best 3rd-place teams
            </div>
            {groups.map((g,i)=><GroupTable key={i} g={g}/>)}
          </>
        )}

        {tab==="summaries"&&(
          completed.length===0
            ?<div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:44,marginBottom:10}}>📰</div><div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{dayMatches.length>0?"Games not finished yet":"No matches this day"}</div><div style={{fontSize:13}}>{dayMatches.length>0?"Check back after the games!":"Navigate to June 11 to read the first recaps"}</div></div>
            :<>{<div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:14}}>Tap "Read Game Summary" for a fun recap ✨</div>}{completed.map((m,i)=><SummaryCard key={m.espnId||i} m={m}/>)}</>
        )}

        <div style={{textAlign:"center",padding:"20px 0 8px",color:C.muted,fontSize:11}}>
          Live scores via ESPN · Auto-refreshes every 60 sec · Times in CDT
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
