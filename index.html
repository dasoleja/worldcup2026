const fmtDate = s => {
  try { return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}); }
  catch { return s; }
};
const addDays = (s,n) => {
  const d = new Date(s+"T12:00:00"); d.setDate(d.getDate()+n);
  return d.toISOString().split("T")[0];
};

// STANDINGS CALCULATOR
// ═══════════════════════════════════════════════════════════════
const calcStandings = () => {
  const stats = {};
  const init = n => { if (!stats[n]) stats[n]={name:n,played:0,w:0,d:0,l:0,gf:0,ga:0}; };
  MATCHES.forEach(m => {
    if (m.score1==null||m.score2==null) return;
    init(m.team1); init(m.team2);
    stats[m.team1].played++; stats[m.team2].played++;
    stats[m.team1].gf+=m.score1; stats[m.team1].ga+=m.score2;
    stats[m.team2].gf+=m.score2; stats[m.team2].ga+=m.score1;
    if(m.score1>m.score2){stats[m.team1].w++;stats[m.team2].l++;}
    else if(m.score2>m.score1){stats[m.team2].w++;stats[m.team1].l++;}
    else{stats[m.team1].d++;stats[m.team2].d++;}
  });
  return Object.entries(GROUP_MAP).map(([grp,teams])=>({
    name:grp,
    standings:teams.map(t=>{
      const s=stats[t]||{name:t,played:0,w:0,d:0,l:0,gf:0,ga:0};
      return{...s,gd:s.gf-s.ga,pts:s.w*3+s.d};
    }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf)
  }));
};

// SUMMARY (AI with programmatic fallback)
// ═══════════════════════════════════════════════════════════════
function makeSummary(m) {
  const h = m.team1, a = m.team2, hs = m.score1, as_ = m.score2, grp = m.group;
  const g1 = (m.goals1||[]), g2 = (m.goals2||[]), rc = (m.redCards||[]);
  let s = "";
  if (hs > as_) s = `What a game! ${fl(h)} ${h} beat ${fl(a)} ${a} ${hs}–${as_} and picks up 3 huge points in Group ${grp}! `;
  else if (as_ > hs) s = `Exciting result! ${fl(a)} ${a} beat ${fl(h)} ${h} ${as_}–${hs} and earned 3 big points in Group ${grp}! `;
  else s = `They couldn't be separated! ${fl(h)} ${h} and ${fl(a)} ${a} drew ${hs}–${as_} in Group ${grp}, each taking home 1 point. `;
  const allGoals = [...g1.map(g=>({...g,team:h})),...g2.map(g=>({...g,team:a}))].sort((a,b)=>parseInt(a.minute)-parseInt(b.minute));
  if (allGoals.length) s += "The goals: " + allGoals.map(g=>`${fl(g.team)} ${g.name} (${g.minute}')`).join(", ") + ". ";
  if (rc.length) {
    s += `🟥 This match had ${rc.length > 1 ? rc.length+" red cards" : "a red card"} — `;
    s += rc.map(r=>`${r.player} (${r.team}, ${r.minute}')`).join(" and ");
    s += ` ${rc.length>1?"were":"was"} sent off. A red card means a player is ejected and can't return — their team must play short-handed! `;
  }
  if (hs > as_) s += `In the World Cup, teams earn 3 points for a win and 1 for a draw — they need enough to advance to the knockout rounds. ${h} is in great shape! 🌟`;
  else if (as_ > hs) s += `In the World Cup, teams earn 3 points for a win and 1 for a draw — they need enough to advance to the knockout rounds. ${a} is in great shape! 🌟`;
  else s += `Both teams will be hoping for a win next time — they need enough points to reach the knockout rounds! 🤞`;
  return s;
}

async function getAISummary(m) {
  const g1 = (m.goals1||[]).map(g=>`${g.name} (${g.minute}')`).join(", ");
  const g2 = (m.goals2||[]).map(g=>`${g.name} (${g.minute}')`).join(", ");
  const rc = (m.redCards||[]).map(r=>`${r.player} (${r.team}, ${r.minute}')`).join(", ");
  const prompt = `Write a fun, warm 3-4 sentence World Cup recap for a dad sharing with his two 10-year-old daughters who love geography and travel but are new to soccer. Simple language only!\n\nMatch: ${m.team1} ${m.score1}–${m.score2} ${m.team2} | Group ${m.group} | ${m.venue}, ${m.city}\n${g1?m.team1+" scored: "+g1:""}\n${g2?m.team2+" scored: "+g2:""}\n${rc?"🟥 Red cards: "+rc+" (ejected — team plays short-handed)":""}\n\nCover: (1) exciting result, (2) standout moments, (3) what these points mean for Group ${m.group} — 3 pts for win, 1 for draw, need enough to advance.`;
  const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const data = await res.json();
  if(data.type==="error"||!data.content) throw new Error("API unavailable");
  return data.content?.[0]?.text || null;
}

async function getSummary(m) {
  try { const ai = await getAISummary(m); if(ai) return {text:ai,ai:true}; } catch {}
  return {text:makeSummary(m),ai:false};
}

// ═══════════════════════════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════════════════════════
const C = {bg:"#08111E",card:"#0F1E35",border:"#1B3254",green:"#00D158",gold:"#FFD700",red:"#FF3B30",blue:"#4A9EE8",text:"#EEF2F7",muted:"#6B8CAE",adv:"rgba(0,209,88,0.1)",goldBg:"rgba(255,215,0,0.1)"};

// ═══════════════════════════════════════════════════════════════
// COMPONENTS
// ═══════════════════════════════════════════════════════════════
function MatchCard({m}) {
  const done = m.score1!=null&&m.score2!=null;
  const rc = m.redCards||[];
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{background:C.goldBg,color:C.gold,borderRadius:5,padding:"3px 8px",fontSize:11,fontWeight:700}}>GROUP {m.group}</span>
        <span style={{color:C.muted,fontSize:12}}>{m.time}</span>
        <span style={{background:done?"rgba(0,209,88,.18)":"rgba(74,158,232,.18)",color:done?C.green:C.blue,borderRadius:4,padding:"3px 8px",fontSize:11,fontWeight:700}}>{done?"FINAL":"UPCOMING"}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:36}}>{fl(m.team1)}</div>
          <div style={{fontSize:13,fontWeight:700,marginTop:5,color:C.text}}>{m.team1}</div>
          {done&&m.goals1.length>0&&<div style={{fontSize:10,color:C.muted,marginTop:3,lineHeight:1.6}}>{m.goals1.map(g=>`⚽ ${g.name} ${g.minute}'`).join("\n")}</div>}
          {done&&rc.filter(r=>r.team===m.team1).length>0&&<div style={{fontSize:10,color:C.red,marginTop:2}}>🟥 {rc.filter(r=>r.team===m.team1).map(r=>`${r.player} ${r.minute}'`).join(", ")}</div>}
        </div>
        <div style={{textAlign:"center",minWidth:80}}>
          {done?<div style={{fontSize:30,fontWeight:900,color:C.text}}>{m.score1}<span style={{color:C.muted,margin:"0 4px"}}>–</span>{m.score2}</div>
               :<div style={{fontSize:18,color:C.muted}}>vs</div>}
        </div>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:36}}>{fl(m.team2)}</div>
          <div style={{fontSize:13,fontWeight:700,marginTop:5,color:C.text}}>{m.team2}</div>
          {done&&m.goals2.length>0&&<div style={{fontSize:10,color:C.muted,marginTop:3,lineHeight:1.6}}>{m.goals2.map(g=>`⚽ ${g.name} ${g.minute}'`).join("\n")}</div>}
          {done&&rc.filter(r=>r.team===m.team2).length>0&&<div style={{fontSize:10,color:C.red,marginTop:2}}>🟥 {rc.filter(r=>r.team===m.team2).map(r=>`${r.player} ${r.minute}'`).join(", ")}</div>}
        </div>
      </div>
      {m.city&&m.city!=="TBD"&&<div style={{marginTop:11,textAlign:"center",color:C.muted,fontSize:12}}>🏟️ {m.venue}, {m.city}</div>}
    </div>
  );
}

function SummaryCard({m}) {
  const [state,setState] = useState({text:null,loading:false,ai:false});
  const hf=getFact(m.team1), af=getFact(m.team2), rc=m.redCards||[];
  const generate = async()=>{
    setState(s=>({...s,loading:true}));
    const res = await getSummary(m);
    setState({text:res.text,loading:false,ai:res.ai});
  };
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginBottom:6}}>
        <span style={{fontSize:28}}>{fl(m.team1)}</span>
        <span style={{fontSize:22,fontWeight:900,color:C.text}}>{m.score1} – {m.score2}</span>
        <span style={{fontSize:28}}>{fl(m.team2)}</span>
      </div>
      <div style={{textAlign:"center",color:C.muted,fontSize:12,marginBottom:10}}>{m.team1} vs {m.team2} · Group {m.group}</div>
      {(m.goals1.length>0||m.goals2.length>0||rc.length>0)&&(
        <div style={{background:"rgba(255,255,255,.03)",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:12,lineHeight:1.8,color:"#A8BDD0",textAlign:"center"}}>
          {m.goals1.map(g=><div key={g.name}>{fl(m.team1)} ⚽ {g.name} {g.minute}'</div>)}
          {m.goals2.map(g=><div key={g.name}>{fl(m.team2)} ⚽ {g.name} {g.minute}'</div>)}
          {rc.map(r=><div key={r.player} style={{color:C.red}}>🟥 {r.player} ({r.team}) {r.minute}'</div>)}
        </div>
      )}
      {!state.text&&!state.loading&&(
        <button onClick={generate} style={{width:"100%",padding:12,borderRadius:10,background:"linear-gradient(135deg,#00A843,#00D158)",color:"#fff",fontWeight:700,fontSize:14,border:"none",cursor:"pointer",marginBottom:14}}>
          ✨ Read Game Summary
        </button>
      )}
      {state.loading&&<div style={{textAlign:"center",padding:"16px 0",color:C.muted,marginBottom:14}}><div style={{fontSize:26}}>⚽</div><div style={{fontSize:13,marginTop:6}}>Generating recap...</div></div>}
      {state.text&&(
        <div style={{marginBottom:16}}>
          <div style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"14px 15px",fontSize:14,lineHeight:1.75,color:C.text}}>{state.text}</div>
          {state.ai&&<div style={{textAlign:"center",fontSize:10,color:C.muted,marginTop:6}}>✨ AI-generated summary</div>}
        </div>
      )}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:13}}>
        <div style={{fontSize:11,color:C.gold,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>🗺️ Fun Facts for Curious Travelers</div>
        {[{name:m.team1,d:hf},{name:m.team2,d:af}].map(({name,d})=>(
          <div key={name} style={{border:"1.5px dashed rgba(255,215,0,.25)",borderRadius:10,padding:"10px 12px",marginBottom:8,fontSize:13,lineHeight:1.6,color:"#C4D4E4"}}>
            <span style={{fontSize:18,marginRight:6}}>{d.e}</span><strong style={{color:C.text}}>{name}:</strong>{" "}{d.f}
          </div>
        ))}
      </div>
    </div>
  );
}

function GroupTable({g}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",marginBottom:12}}>
      <div style={{background:C.goldBg,borderBottom:`1px solid ${C.border}`,padding:"10px 14px",fontWeight:800,fontSize:13,color:C.gold}}>GROUP {g.name}</div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr>{["#","Team","P","W","D","L","GD","Pts"].map((h,i)=>(
          <th key={i} style={{padding:"8px 8px",fontWeight:500,fontSize:11,color:h==="Pts"?C.green:C.muted,textAlign:i<2?"left":"center"}}>{h}</th>
        ))}</tr></thead>
        <tbody>{g.standings.map((t,i)=>{
          const adv=i<2;
          return <tr key={i} style={{background:adv?C.adv:"transparent",borderTop:`1px solid ${C.border}`}}>
            <td style={{padding:"10px 8px",color:adv?C.green:C.muted,fontWeight:700,textAlign:"left"}}>{i+1}</td>
            <td style={{padding:"10px 8px",textAlign:"left"}}><span style={{marginRight:6}}>{fl(t.name)}</span><span style={{fontWeight:600,color:C.text}}>{t.name}</span>{adv&&<span style={{marginLeft:5,fontSize:10,color:C.green}}>↑</span>}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.played}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.w}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.d}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.l}</td>
            <td style={{padding:"10px 8px",textAlign:"center",color:C.muted}}>{t.gd>=0?"+":""}{t.gd}</td>
            <td style={{padding:"10px 8px",textAlign:"center",fontWeight:900,color:C.green}}>{t.pts}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
const GROUPS = calcStandings();

function App() {
  const [tab,setTab] = useState("schedule");
  const [dateStr,setDateStr] = useState("2026-06-11");
  const TABS = [{id:"schedule",label:"📅 Schedule"},{id:"standings",label:"🏆 Standings"},{id:"summaries",label:"📰 Summaries"}];
  const dayMatches = MATCHES.filter(m=>m.date===dateStr);
  const completed = dayMatches.filter(m=>m.score1!=null&&m.score2!=null);

  return (
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:600,margin:"0 auto",color:C.text,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{background:"linear-gradient(180deg,#0C1F3D,#08111E)",borderBottom:`3px solid ${C.green}`,padding:"20px 16px 14px",position:"sticky",top:0,zIndex:10}}>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:11,color:C.gold,letterSpacing:3,fontWeight:700,textTransform:"uppercase"}}>FIFA World Cup 2026</div>
          <div style={{fontSize:26,fontWeight:900,letterSpacing:-0.5,marginTop:2}}>⚽ Match Tracker</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2,letterSpacing:1}}>USA · CANADA · MEXICO</div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
          <button onClick={()=>setDateStr(s=>addDays(s,-1))} style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,color:C.text,borderRadius:10,width:42,height:42,fontSize:20,cursor:"pointer"}}>‹</button>
          <div style={{textAlign:"center",minWidth:200}}>
            <div style={{fontSize:15,fontWeight:700}}>{fmtDate(dateStr)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{dayMatches.length>0?`${dayMatches.length} match${dayMatches.length>1?"es":""} · ${completed.length} final`:"No matches"}</div>
          </div>
          <button onClick={()=>setDateStr(s=>addDays(s,1))} style={{background:"rgba(255,255,255,.07)",border:`1px solid ${C.border}`,color:C.text,borderRadius:10,width:42,height:42,fontSize:20,cursor:"pointer"}}>›</button>
        </div>
      </div>

      <div style={{display:"flex",background:"#0C1A2E",borderBottom:`1px solid ${C.border}`}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"13px 4px",background:"none",border:"none",borderBottom:tab===t.id?`3px solid ${C.green}`:"3px solid transparent",color:tab===t.id?C.green:C.muted,fontWeight:tab===t.id?700:400,fontSize:13,cursor:"pointer"}}>{t.label}</button>
        ))}
      </div>

      <div style={{padding:16}}>
        {tab==="schedule"&&(dayMatches.length===0
          ?<div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:44,marginBottom:10}}>📅</div><div style={{fontWeight:700,fontSize:16,marginBottom:6}}>No matches scheduled</div><div style={{fontSize:13}}>Tap the arrows to browse match days</div></div>
          :dayMatches.map((m,i)=><MatchCard key={i} m={m}/>)
        )}

        {tab==="standings"&&(
          <>
            <div style={{background:"rgba(0,209,88,.08)",border:"1px solid rgba(0,209,88,.2)",borderRadius:10,padding:"10px 14px",fontSize:12,color:C.green,textAlign:"center",marginBottom:16}}>↑ Top 2 per group advance · Plus the 8 best 3rd-place teams</div>
            {GROUPS.map((g,i)=><GroupTable key={i} g={g}/>)}
          </>
        )}

        {tab==="summaries"&&(completed.length===0
          ?<div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:44,marginBottom:10}}>📰</div><div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{dayMatches.length>0?"Games not finished yet":"No matches this day"}</div><div style={{fontSize:13}}>{dayMatches.length>0?"Check back after the games!":"Navigate to June 11 to read the first recaps"}</div></div>
          :<>{<div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:14}}>Tap "Read Game Summary" for a fun recap ✨</div>}{completed.map((m,i)=><SummaryCard key={i} m={m}/>)}</>
        )}

        <div style={{textAlign:"center",padding:"20px 0 8px",color:C.muted,fontSize:11}}>Schedule verified June 12, 2026 · All times in CDT</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
