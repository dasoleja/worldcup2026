// ─── Utilities ───
function fmtDate(s) {
  try { return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}); }
  catch(e) { return s; }
}
function addDays(s, n) {
  var d = new Date(s+"T12:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().split("T")[0];
}
function toDateStr(utc) {
  try { return new Date(utc).toLocaleDateString("en-CA",{timeZone:"America/Chicago"}); }
  catch(e) { return ""; }
}
function toCDT(utc) {
  try { return new Date(utc).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:"America/Chicago"})+" CDT"; }
  catch(e) { return "TBD"; }
}

// ─── ESPN API ───
function fetchESPN(dateStr) {
  var d = dateStr.replace(/-/g,"");
  return fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates="+d+"&limit=20")
    .then(function(r){ return r.json(); })
    .then(function(data){
      return (data.events||[]).map(function(ev){
        var comp = ev.competitions && ev.competitions[0];
        var competitors = comp && comp.competitors || [];
        var home = competitors.find(function(c){ return c.homeAway==="home"; });
        var away = competitors.find(function(c){ return c.homeAway==="away"; });
        var statusType = comp && comp.status && comp.status.type;
        var done = !!(statusType && (statusType.completed || statusType.name==="STATUS_FINAL"));
        var live = !done && !!(statusType && (statusType.name==="STATUS_IN_PROGRESS"||statusType.name==="STATUS_HALFTIME"||statusType.name==="STATUS_END_PERIOD"));
        var hScore = (done||live) ? parseInt((home&&home.score)||"0") : null;
        var aScore = (done||live) ? parseInt((away&&away.score)||"0") : null;
        var hName = (home&&home.team&&(home.team.displayName||home.team.name))||"TBD";
        var aName = (away&&away.team&&(away.team.displayName||away.team.name))||"TBD";
        return {
          date: toDateStr(ev.date),
          time: toCDT(ev.date),
          team1: hName, team2: aName,
          score1: hScore, score2: aScore,
          group: getGroup(hName),
          venue: (comp&&comp.venue&&comp.venue.fullName)||"",
          city: (comp&&comp.venue&&comp.venue.address&&comp.venue.address.city)||"",
          status: done?"FINAL":live?"LIVE":"UPCOMING",
          statusDetail: (statusType&&statusType.shortDetail)||"",
          espnId: ev.id,
          goals1:[], goals2:[], redCards:[]
        };
      });
    });
}

function fetchStandings() {
  return fetch("https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings")
    .then(function(r){ return r.json(); })
    .then(function(data){
      var groups = [];
      var children = data.children || [];

        var entry = children[i];
        var groupName = (entry.name||"").replace("Group ","").trim() || "?";
        var entries = (entry.standings&&entry.standings.entries)||[];
        var standings = entries.map(function(e2){
          var team = (e2.team&&(e2.team.displayName||e2.team.name))||"TBD";
          var stats = {};

          return {
            name: team,
            played: stats.gamesPlayed||0,
            w: stats.wins||0,
            d: stats.ties||0,
            l: stats.losses||0,
            gf: stats.pointsFor||0,
            ga: stats.pointsAgainst||0,
            gd: stats.pointDifferential||0,
            pts: stats.points||0
          };
        });
        standings.sort(function(a,b){ return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf; });
        groups.push({name:groupName, standings:standings});
      }
      return groups;
    });
}

function calcStandings(matches) {
  var stats = {};
  function init(n){ if(!stats[n]) stats[n]={name:n,played:0,w:0,d:0,l:0,gf:0,ga:0}; }
  matches.forEach(function(m){
    if(m.score1==null||m.score2==null) return;
    init(m.team1); init(m.team2);
    stats[m.team1].played++; stats[m.team2].played++;
    stats[m.team1].gf+=m.score1; stats[m.team1].ga+=m.score2;
    stats[m.team2].gf+=m.score2; stats[m.team2].ga+=m.score1;
    if(m.score1>m.score2){stats[m.team1].w++;stats[m.team2].l++;}
    else if(m.score2>m.score1){stats[m.team2].w++;stats[m.team1].l++;}
    else{stats[m.team1].d++;stats[m.team2].d++;}
  });
  return Object.keys(GROUP_MAP).map(function(grp){
    var teams = GROUP_MAP[grp];
    var standing = teams.map(function(t){
      var s = stats[t]||{name:t,played:0,w:0,d:0,l:0,gf:0,ga:0};
      return Object.assign({},s,{gd:s.gf-s.ga,pts:s.w*3+s.d});
    });
    standing.sort(function(a,b){ return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf; });
    return {name:grp, standings:standing};
  });
}

function callClaude(prompt) {
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  }).then(function(r){ return r.json(); })
  .then(function(data){
    if(data.type==="error"||!data.content) throw new Error("API error");
    return (data.content[0]&&data.content[0].text)||"";
  });
}

function getAISummary(m) {
  var g1 = (m.goals1||[]).map(function(g){ return g.name+" ("+g.minute+"')"; }).join(", ");
  var g2 = (m.goals2||[]).map(function(g){ return g.name+" ("+g.minute+"')"; }).join(", ");
  var rc = (m.redCards||[]).map(function(r){ return (r.player||r.team)+" ("+r.minute+"')"; }).join(", ");
  var prompt = "Write a fun, warm 3-4 sentence World Cup recap for a dad sharing with his two 10-year-old daughters who love geography and travel but are new to soccer. Simple language only!\n\nMatch: "+m.team1+" "+m.score1+"–"+m.score2+" "+m.team2+" | Group "+m.group+(m.venue?"\nVenue: "+m.venue+", "+m.city:"")+(g1?"\n"+m.team1+" goals: "+g1:"")+(g2?"\n"+m.team2+" goals: "+g2:"")+(rc?"\nRed cards: "+rc+" (ejected — team plays short-handed)":"")+"\n\nCover: (1) exciting result, (2) standout moments, (3) what these points mean for Group "+m.group+" — 3 pts for win, 1 for draw, need enough to advance.";
  return callClaude(prompt);
}

function makeLocalSummary(m) {
  var h=m.team1, a=m.team2, hs=m.score1, as_=m.score2, grp=m.group;
  var g1=m.goals1||[], g2=m.goals2||[], rc=m.redCards||[];
  var s="";
  if(hs>as_) s="What a result! "+fl(h)+" "+h+" beat "+fl(a)+" "+a+" "+hs+"–"+as_+" and picks up 3 big points in Group "+grp+"! ";
  else if(as_>hs) s="Big result! "+fl(a)+" "+a+" beat "+fl(h)+" "+h+" "+as_+"–"+hs+" and earns 3 points in Group "+grp+"! ";
  else s="What a battle! "+fl(h)+" "+h+" and "+fl(a)+" "+a+" drew "+hs+"–"+as_+" in Group "+grp+", each earning 1 point. ";
  var all = g1.map(function(g){ return {name:g.name,minute:g.minute,t:h}; }).concat(g2.map(function(g){ return {name:g.name,minute:g.minute,t:a}; }));
  all.sort(function(a,b){ return parseInt(a.minute)-parseInt(b.minute); });
  if(all.length) s+="Goals: "+all.map(function(g){ return fl(g.t)+" "+g.name+" ("+g.minute+"')"; }).join(", ")+". ";
  if(rc.length){
    s+="There "+(rc.length>1?"were":"was")+" also "+rc.length+" red card"+(rc.length>1?"s":"")+" — ";
    s+=rc.map(function(r){ return r.player+" ("+r.team+")"; }).join(" and ");
    s+=" got sent off. A red card means a player is ejected and their team plays short-handed! ";
  }
  if(hs>as_) s+="In the World Cup, teams earn 3 points for a win, 1 for a draw. "+h+" is off to a great start! 🌟";
  else if(as_>hs) s+=a+" is off to a great start! 🌟";
  else s+="Both teams will be hoping for a win next time to advance to the knockout rounds! 🤞";
  return s;
}

          e("button",{type:"submit",style:{background:"linear-gradient(135deg,#00A843,"+C.green+")",border:"none",borderRadius:10,padding:"10px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}, "Ask")
        ),
        searching ? e("div",{style:{textAlign:"center",padding:"16px 0",color:C.muted}}, e("div",{style:{fontSize:22,marginBottom:6}}, "🔍"), e("div",{style:{fontSize:13}}, "Looking that up...")) : null,
        searchAnswer ? e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"14px 15px",fontSize:14,lineHeight:1.75,color:C.text,marginBottom:12}}, searchAnswer) : null,
        searchQuery ? e("div",{style:{textAlign:"center",marginBottom:14}},
          e("a",{href:"https://www.google.com/search?q=FIFA+World+Cup+2026+"+encodeURIComponent(searchQuery),target:"_blank",rel:"noreferrer",style:{fontSize:12,color:C.blue,textDecoration:"none"}},
            "🌐 Search Google for \""+searchQuery+"\""
          )
        ) : null,
        e("div",{style:{textAlign:"center",padding:"12px 0 4px",color:C.muted,fontSize:11}},
          "Live scores via ESPN · Auto-refreshes every 60s · All times in CDT"
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
